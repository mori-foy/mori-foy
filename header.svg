<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFB3D9"/>
      <stop offset="35%"  stop-color="#C9A8FF"/>
      <stop offset="70%"  stop-color="#A8D8FF"/>
      <stop offset="100%" stop-color="#A8FFDE"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="160" fill="url(#bg)" rx="0"/>

  <!-- decorative circles -->
  <circle cx="60"  cy="30"  r="18" fill="#fff" fill-opacity="0.25">
    <animate attributeName="cy" values="30;18;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="840" cy="130" r="12" fill="#fff" fill-opacity="0.2">
    <animate attributeName="cy" values="130;118;130" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="28"  r="22" fill="#fff" fill-opacity="0.18">
    <animate attributeName="cy" values="28;14;28" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="130" r="10" fill="#fff" fill-opacity="0.2">
    <animate attributeName="cy" values="130;120;130" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- stars -->
  <text x="30"  y="110" font-size="20" fill="#fff" fill-opacity="0.5">✦
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="860" y="50"  font-size="14" fill="#fff" fill-opacity="0.5">✦
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </text>
  <text x="430" y="22"  font-size="10" fill="#fff" fill-opacity="0.6">★
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.3s" repeatCount="indefinite"/>
  </text>
  <text x="500" y="148" font-size="10" fill="#fff" fill-opacity="0.6">★
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.6s" repeatCount="indefinite"/>
  </text>

  <!-- name -->
  <text x="450" y="82"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="4"
    fill="#fff" text-anchor="middle"
    style="filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))">
    Minami Morikawa
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- subtitle -->
  <text x="450" y="112"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="14" letter-spacing="5"
    fill="#fff" fill-opacity="0.85" text-anchor="middle">
    DESIGN  &amp;  WEB DEVELOPMENT
    <animate attributeName="opacity" values="0;0.85" dur="1.5s" fill="freeze"/>
  </text>
</svg>
