<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" fill="none">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1200" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#F4F6FB"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="faccent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6E8BFF"/>
      <stop offset="0.5" stop-color="#B98FF0"/>
      <stop offset="1" stop-color="#52C9BC"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="120" fill="url(#fbg)"/>

  <!-- top accent line -->
  <rect x="0" y="0" width="1200" height="2.5" fill="url(#faccent)"/>

  <!-- center mark -->
  <text x="600" y="56" text-anchor="middle"
    font-family="'Helvetica Neue',Arial,sans-serif" font-size="20"
    font-weight="600" letter-spacing="8" fill="#1A1F2E">M<tspan fill="#52C9BC">.</tspan>M</text>

  <text x="600" y="84" text-anchor="middle"
    font-family="'SF Mono','Roboto Mono',monospace" font-size="11"
    letter-spacing="4" fill="#9AA2B4">THANKS FOR VISITING</text>
</svg>
