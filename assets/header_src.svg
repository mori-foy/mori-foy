  <!-- pixel hearts -->
  <g fill="#ef7d57">
    <rect x="940" y="64" width="8" height="8"/><rect x="956" y="64" width="8" height="8"/>
    <rect x="932" y="72" width="40" height="8"/><rect x="940" y="80" width="24" height="8"/>
