<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <!-- retro palette: bg #1a1c2c, accents pink/cyan/yellow/green -->
  <rect width="1200" height="260" fill="#1a1c2c"/>
  <rect width="1200" height="260" fill="none" stroke="#3b3f5c" stroke-width="16"/>
  <rect x="20" y="20" width="1160" height="220" fill="none" stroke="#566c86" stroke-width="6"/>

  <!-- pixel gem left -->
  <g>
    <rect x="120" y="96" width="60" height="20" fill="#41a6f6"/>
    <rect x="132" y="116" width="36" height="20" fill="#41a6f6"/>
    <rect x="144" y="136" width="12" height="16" fill="#41a6f6"/>
    <rect x="120" y="96" width="60" height="8" fill="#73eff7"/>
    <rect x="132" y="116" width="12" height="20" fill="#1a6fb0"/>
  </g>
  <!-- pixel gem right -->
  <g>
    <rect x="1020" y="116" width="60" height="20" fill="#ef7d57"/>
    <rect x="1032" y="136" width="36" height="20" fill="#ef7d57"/>
    <rect x="1044" y="156" width="12" height="16" fill="#ef7d57"/>
    <rect x="1020" y="116" width="60" height="8" fill="#ffcd75"/>
    <rect x="1056" y="136" width="12" height="20" fill="#b13e53"/>
