    <rect x="232" y="188" width="40" height="8"/><rect x="240" y="196" width="24" height="8"/>
    <rect x="248" y="204" width="8" height="8"/>
  </g>

  <!-- title -->
  <text x="600" y="138" text-anchor="middle"
    font-family="'Courier New',monospace" font-size="64" font-weight="900"
